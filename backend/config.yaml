# Veer 配置文件
# 环境变量覆盖: 使用 CDNC_ 前缀，例如 CDNC_SERVER_PORT=9000

server:
  host: "0.0.0.0"
  port: 8080

database:
  path: "./veer.db"

jwt:
  secret: "change-me-in-production-256bits!"
  expiry_hours: 24

admin:
  username: "admin"
  password: "admin123"

health_check:
  enabled: true
  interval_seconds: 30
  fail_threshold: 3
  timeout_seconds: 5

rate_limit:
  enabled: true
  requests_per_minute: 60
  whitelist:
    - "127.0.0.1"
    - "::1"

scheduler:
  host: "0.0.0.0"
  port: 8081
  # 规则缓存刷新间隔（秒）
  refresh_interval: 10

# 边缘节点服务（缓存反向代理）
edge:
  host: "0.0.0.0"
  port: 8082
  name: "edge-1"
  region: "default"
  # 节点对外访问地址（Manager 用此 URL 做 302 跳转）
  public_url: "http://localhost:8082"
  # Manager 连接配置（留空则不注册，使用本地配置）
  manager:
    url: "http://localhost:8080"
    secret: "veer-edge-secret"
  # 默认回源地址（注册后由 Manager 下发覆盖）
  origin_base_url: "http://origin:80"
  cache:
    # 缓存 TTL（秒）
    ttl_seconds: 300
    # 最大缓存大小（MB）
    max_size_mb: 512

cache:
  max_age_seconds: 300
