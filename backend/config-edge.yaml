# Veer Edge 配置文件
# 环境变量覆盖: 使用 CDNC_ 前缀，例如 CDNC_EDGE_PORT=9082

edge:
  host: "0.0.0.0"
  port: 8082
  name: "edge-1"
  region: "default"
  public_url: "http://localhost:8082"
  manager:
    url: "http://localhost:8080"
    secret: "veer-edge-secret"
  origin_base_url: ""
  cache:
    ttl_seconds: 300
    max_size_mb: 512
    max_l1_mb: 4096
    disk:
      enabled: true
      path: "./data/cache/veer"
      max_size_gb: 500
      segment_size_mb: 512
      write_buffer_kb: 4096
      flush_interval_ms: 100
      debug: true
      compaction:
        enabled: true
        watermark: 0.85
        interval_minutes: 30
        max_segments: 200
      index:
        bloom_bits_per_entry: 16
        sparse_max_entries: 10000000
